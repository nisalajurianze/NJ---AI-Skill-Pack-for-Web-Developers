name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Verify Installer
        run: node install.js --local
        
      - name: Check Frontmatter
        run: |
          for file in skills/*/SKILL.md; do
            if ! grep -q "^name:" "$file"; then
              echo "Error: $file is missing the 'name:' field in frontmatter"
              exit 1
            fi
            if ! grep -q "^description:" "$file"; then
              echo "Error: $file is missing the 'description:' field in frontmatter"
              exit 1
            fi
          done
          echo "All skills passed frontmatter check!"
